<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RestaurantBook — Reserve Your Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0a0f1e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }
      #splash-icon {
        font-size: 56px;
        color: #c9a84c;
        animation: splashPulse 1.2s ease-in-out infinite;
        margin-bottom: 20px;
        font-family: serif;
      }
      #splash-title {
        font-family: 'Syne', sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      #splash-sub {
        font-family: 'Inter', sans-serif;
        font-size: 0.8rem;
        color: #6b7a9e;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      #splash-bar-wrap {
        margin-top: 32px;
        width: 120px;
        height: 2px;
        background: rgba(201,168,76,0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      #splash-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c9a84c, #e8c97a);
        border-radius: 2px;
        animation: splashLoad 1.4s ease forwards;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      @keyframes splashLoad {
        0% { width: 0%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-icon">✦</div>
      <div id="splash-title">RestaurantBook</div>
      <div id="splash-sub">Fine Dining Reservations</div>
      <div id="splash-bar-wrap">
        <div id="splash-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function () { splash.remove(); }, 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
